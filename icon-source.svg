<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="leftHalf"><rect x="0" y="0" width="256" height="512"/></clipPath>
    <clipPath id="rightHalf"><rect x="256" y="0" width="256" height="512"/></clipPath>
  </defs>
  <!-- Left half: war red -->
  <g clip-path="url(#leftHalf)">
    <circle cx="256" cy="256" r="240" fill="#e63946"/>
  </g>
  <!-- Right half: teal -->
  <g clip-path="url(#rightHalf)">
    <circle cx="256" cy="256" r="240" fill="#2ec4b6"/>
  </g>
  <!-- Center divider -->
  <line x1="256" y1="16" x2="256" y2="496" stroke="#0a0a0c" stroke-width="10"/>
  <!-- Dollar sign -->
  <text x="256" y="320" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="260" fill="#0a0a0c">$</text>
</svg>
